<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Panel body -->
  <rect x="4" y="4" width="92" height="92" rx="10" fill="#2b2f38" stroke="#474d5c" stroke-width="2"/>

  <!-- Port sockets — top row -->
  <circle cx="20" cy="36" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>
  <circle cx="40" cy="36" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>
  <circle cx="60" cy="36" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>
  <circle cx="80" cy="36" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>

  <!-- Port sockets — bottom row -->
  <circle cx="20" cy="66" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>
  <circle cx="40" cy="66" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>
  <circle cx="60" cy="66" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>
  <circle cx="80" cy="66" r="6.5" fill="#1a1d24" stroke="#5a606e" stroke-width="1.5"/>

  <!-- Patch cable: red — top-left to top-middle-right -->
  <path d="M20,36 C20,14 60,14 60,36" fill="none" stroke="#e84040" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Patch cable: blue — top-second to bottom-second -->
  <path d="M40,36 C40,51 40,51 40,66" fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Patch cable: yellow/green — top-right to bottom-left -->
  <path d="M80,36 C80,56 20,46 20,66" fill="none" stroke="#f0c030" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Patch cable: green — bottom-third to bottom-right -->
  <path d="M60,66 C60,82 80,82 80,66" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Plug tips (draw on top of cables) -->
  <circle cx="20" cy="36" r="4" fill="#e84040"/>
  <circle cx="60" cy="36" r="4" fill="#e84040"/>
  <circle cx="40" cy="36" r="4" fill="#3b82f6"/>
  <circle cx="40" cy="66" r="4" fill="#3b82f6"/>
  <circle cx="80" cy="36" r="4" fill="#f0c030"/>
  <circle cx="20" cy="66" r="4" fill="#f0c030"/>
  <circle cx="60" cy="66" r="4" fill="#22c55e"/>
  <circle cx="80" cy="66" r="4" fill="#22c55e"/>
</svg>
