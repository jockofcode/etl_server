# Redirect HTTP to HTTPS for files.cnxkit.com
server {
    listen 80;
    listen [::]:80;
    server_name files.cnxkit.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — files.cnxkit.com per-user file hosting
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name files.cnxkit.com;

    ssl_certificate     /etc/letsencrypt/live/cnxkit.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cnxkit.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Increase max upload size (default 1m is too small for file hosting)
    client_max_body_size 100m;

    location / {
        proxy_pass         http://127.0.0.1:3004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Files-Host      "1";
        # Do NOT set X-ETL-Subdomain — this is not a flow subdomain.
    }
}
